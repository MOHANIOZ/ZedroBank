<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaBank | Premium Banking</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="auth-wrapper" id="authBox">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="logo-icon">₹</span>
            <h1>JavaBank</h1>
            <p id="authSubtitle">Premium Digital Banking</p>
        </div>

        <div id="loginForm">
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input type="text" id="loginUser" placeholder="Username">
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button class="btn-login" onclick="handleLogin()">Sign In →</button>
            <p class="hint-text" onclick="toggleAuth(true)">New here? <b>Create Account</b></p>
        </div>

        <div id="signupForm" style="display:none;">
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input type="text" id="regUser" placeholder="Choose Username">
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="regPass" placeholder="Set Password">
            </div>
            <button class="btn-login btn-green" onclick="handleSignup()">Register Now →</button>
            <p class="hint-text" onclick="toggleAuth(false)">Already have an account? <b>Login</b></p>
        </div>
    </div>
</div>

<div id="homePage" style="display:none;" class="app-wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon-sm">₹</span>
            <span class="brand-name">JavaBank</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" onclick="showSection('homeContent')">🏠 Dashboard</a>
            <a href="#" class="nav-item" onclick="showSection('viewBalanceSection')">🔍 Check Balance</a>
            <a href="#" class="nav-item" onclick="showSection('depositSection')">💰 Deposit</a>
            <a href="#" class="nav-item" onclick="showSection('withdrawSection')">💸 Withdraw</a>
            <a href="#" class="nav-item" onclick="showSection('transferSection')">🔄 Transfer</a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="location.reload()">⏻ Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <section id="homeContent" class="page active-page">
            <h2>Welcome to your Dashboard</h2>
            <div class="action-grid">
                <div class="action-card" onclick="showSection('viewBalanceSection')">🔍 Balance</div>
                <div class="action-card" onclick="showSection('depositSection')">💰 Deposit</div>
                <div class="action-card" onclick="showSection('withdrawSection')">💸 Withdraw</div>
                <div class="action-card" onclick="showSection('transferSection')">🔄 Transfer</div>
            </div>
        </section>

        <section id="viewBalanceSection" class="page" style="display:none;">
            <h3>Check Balance</h3>
            <input type="number" id="vId" placeholder="Account ID">
            <button class="btn-action" onclick="getAccountDetails()">View Details</button>
            <div id="res" class="result-box" style="display:none;"></div>
        </section>

        <section id="depositSection" class="page" style="display:none;">
            <h3>Deposit Money</h3>
            <input type="number" id="depId" placeholder="Account ID">
            <input type="number" id="depAmount" placeholder="Amount">
            <button class="btn-action" onclick="apiCall('deposit','depId','depAmount')">Confirm</button>
        </section>

        <section id="transferSection" class="page" style="display:none;">
            <h3>Transfer Funds</h3>
            <input type="number" id="fromId" placeholder="From ID">
            <input type="number" id="toId" placeholder="To ID">
            <input type="number" id="tAmt" placeholder="Amount">
            <button class="btn-action" onclick="makeTransfer()">Transfer Now</button>
        </section>
    </main>
</div>

<div id="toast" class="toast"></div>
<script src="script.js"></script>
</body>
</html>
